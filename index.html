<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>UnXch</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="intro-title">我们都是中国人</h1>
    <p class="sub-title">欢迎来到我的游戏频道</p>

    <!-- 游戏按钮 -->
<a href="game.html" class="game-button" style="display: inline-block; text-decoration: none; padding: 15px 30px; border-radius: 4px; background-color: #4CAF50; color: white; text-align: center;">Eaglercraft</a>

    <!-- 修正后的隐藏播放器 -->
    <iframe width="0" height="0" 
        src="https://youtube.com" 
        id="bgm"
        frameborder="0" 
        allow="autoplay">
    </iframe>

    <script>
        // 当你点击网页任何地方，音乐就会变成有声并循环播放
        document.body.addEventListener('click', function() {
            var iframe = document.getElementById('bgm');
            iframe.src = "https://youtube.com";
        }, { once: true });
    </script>

</body>
</html>
